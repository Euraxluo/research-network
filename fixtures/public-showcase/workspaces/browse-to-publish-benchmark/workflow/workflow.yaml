schema: research-workflow/v0.1
name: browse-evidence-publish-asset
version: 0.1.0
description: A benchmark workflow for turning browser-grounded agent research into a
  reusable public asset.
inputs:
  - repository
  - paper source
  - agent run log
  - evaluation evidence
outputs:
  - asset manifest
  - static abstract page
  - skill package
  - workflow graph
stages:
  - id: profile
    name: Profile the contribution
    instructions: Identify the scientific claim, executable components, access model, and
      provenance anchors.
  - id: package
    name: Package the asset
    instructions: Assemble paper, skill, workflow, checksums, license terms, and dependency metadata.
  - id: publish
    name: Publish through protocol kit
    instructions: Run publishWorkspace so local Walrus packaging, Sui-style events, and index
      replay produce the public graph.
  - id: reuse
    name: Prepare reuse
    instructions: Expose install, fork, citation, and settlement paths for downstream humans and agents.
quality_gates:
  - id: manifest-complete
    check: asset.yaml validates and declares paper, skill, and workflow paths
  - id: protocol-published
    check: localnet events contain ResearchAssetPublished and SkillPublished
  - id: agent-assets-visible
    check: skill cards and graph edges are visible in the static site
tools:
  - research validate
  - research publish
  - research replay
  - research web:build
