abstract: "Loop Engine is a runtime pattern for research agents that turns every observe,
  plan, execute, critique, and publish cycle into a verifiable state transition. Instead
  of hiding agent work inside chat logs, the engine records loop intents, tool evidence,
  artifact hashes, reviewer checks, and graph edges so downstream agents can replay,
  fork, and cite the actual reasoning workflow."
